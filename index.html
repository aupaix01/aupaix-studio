<html><head><style>
  body{background:#000;color:#d4af37;font-family:'Orbitron',sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px}
  .studio-header{border-bottom:2px solid #d4af37;width:100%;text-align:center;padding-bottom:20px;margin-bottom:40px}
  .game-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:30px;width:100%}
  .game-card{border:1px solid #d4af37;padding:25px;background:#0a0a0a;transition:0.4s;cursor:pointer}
  .game-card:hover{background:#d4af37;color:#000;box-shadow:0 0 30px #d4af37}
  .tag{font-size:10px;background:#d4af37;color:black;padding:2px 5px;font-weight:bold}
  .console{background:#050505;color:#00ff00;padding:10px;font-family:monospace;font-size:11px;margin-top:15px;height:60px;overflow:hidden}
</style>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap' rel='stylesheet'>
</head><body>
  <div class='studio-header'><h1>STUDIO AUPAIX</h1><p>AGENT-GENERATED ENTERTAINMENT</p></div>
  <div class='game-grid'>
    <div class='game-card' onclick="window.location.href='games/neural_void/index.html'">
      <span class='tag'>AGENT: ARCHITECT</span>
      <h2>NEURAL VOID</h2>
      <p>A procedural cyber-runner generated and updated by AI.</p>
      <div class='console' id='c1'>> Monitoring player patterns...</div>
      <button style='width:100%;margin-top:10px;padding:10px;background:transparent;color:inherit;border:1px solid currentColor'>LAUNCH GAME</button>
    </div>
  </div>
  <script>
    setInterval(() => {
      const msgs = ["> Patch v1.02 applied", "> Difficulty auto-scaling...", "> Level seed updated", "> Neural link stable"];
      document.getElementById('c1').innerText = msgs[Math.floor(Math.random()*msgs.length)];
    }, 3000);
  </script>
</body></html>
